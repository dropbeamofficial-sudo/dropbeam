<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DropBeam — Admin</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial;margin:24px}
    .card{max-width:900px;margin:0 auto}
    input[type=text]{width:60%;padding:8px;margin-right:8px}
    button{padding:8px 12px}
    pre{background:#f6f8fa;padding:12px;border-radius:6px;overflow:auto}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{border:1px solid #ddd;padding:8px;text-align:left}
    th{background:#f3f4f6}
  </style>
</head>
<body>
  <div class="card">
    <h1>DropBeam — Admin</h1>
    <p>Enter your admin token to view current transfers. Token is the same value as `ADMIN_TOKEN` on the backend.</p>
    <div>
      <input id="token" type="text" placeholder="Enter admin token" />
      <button id="load">Load Transfers</button>
      <button id="clear">Clear</button>
    </div>

    <div id="status" style="margin-top:12px"></div>
    <div id="results"></div>
  </div>

  <script src="/_env.js"></script>
  <script>
    const API_BASE = window.__BACKEND_URL__ && window.__BACKEND_URL__.length ? window.__BACKEND_URL__ : window.location.origin;
    const loadBtn = document.getElementById('load');
    const clearBtn = document.getElementById('clear');
    const tokenInput = document.getElementById('token');
    const statusEl = document.getElementById('status');
    const results = document.getElementById('results');

    function showStatus(msg, err=false){ statusEl.textContent = msg; statusEl.style.color = err ? 'crimson' : 'black'; }

    loadBtn.addEventListener('click', async () => {
      const token = tokenInput.value.trim();
      if(!token){ showStatus('Please enter the admin token', true); return; }
      showStatus('Loading...'); results.innerHTML = '';
      try{
        const res = await fetch(API_BASE + '/admin/transfers', { headers: { 'Authorization': 'Bearer ' + token } });
        if(!res.ok){ const text = await res.text(); showStatus('Error: ' + res.status + ' ' + text, true); return; }
        const data = await res.json();
        showStatus('Loaded ' + (data.count || 0) + ' transfers');
        if(!data.transfers || !data.transfers.length){ results.innerHTML = '<p>No active transfers</p>'; return; }

        // render table
        let html = '<table><thead><tr><th>Code</th><th>Files</th><th>Count</th><th>Downloads</th><th>Created</th><th>Expires</th></tr></thead><tbody>';
        data.transfers.forEach(t => {
          const files = t.files.map(f=>`${f.name} (${Math.round(f.size/1024)} KB)`).join('<br>');
          html += `<tr><td>${t.code}</td><td>${files}</td><td>${t.fileCount}</td><td>${t.downloadCount}</td><td>${new Date(t.createdAt).toLocaleString()}</td><td>${new Date(t.expiresAt).toLocaleString()}</td></tr>`;
        });
        html += '</tbody></table>';
        results.innerHTML = html;
      }catch(err){ showStatus('Fetch error: ' + err.message, true); }
    });

    clearBtn.addEventListener('click', ()=>{ tokenInput.value=''; results.innerHTML=''; statusEl.textContent=''; });
  </script>
</body>
</html>
